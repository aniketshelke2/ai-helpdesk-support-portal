_schema-version: "3.3.0"
ID: ai-helpdesk-support-portal
version: 1.0.0
description: "AI Helpdesk Support Portal - CAP + Fiori + XSUAA + HANA HDI"

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
        - rm -rf app/router/resources
        - mkdir -p app/router/resources/tickets
        - cp -r app/tickets/webapp app/router/resources/tickets/

modules:
  - name: ai-helpdesk-support-portal-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: ai-helpdesk-support-portal-auth
      - name: ai-helpdesk-support-portal-db

  - name: ai-helpdesk-support-portal
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: ai-helpdesk-support-portal-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: ai-helpdesk-support-portal-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: ai-helpdesk-support-portal-db

resources:
  - name: ai-helpdesk-support-portal-auth
    type: org.cloudfoundry.managed-service
    requires:
      - name: app-api
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: ai-helpdesk-support-portal-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: "Employee (ai-helpdesk-support-portal ${org}-${space})"
            description: "Employee role collection"
            role-template-references:
              - "$XSAPPNAME.Employee"
          - name: "SupportAgent (ai-helpdesk-support-portal ${org}-${space})"
            description: "Support Agent role collection"
            role-template-references:
              - "$XSAPPNAME.SupportAgent"
          - name: "Manager (ai-helpdesk-support-portal ${org}-${space})"
            description: "Manager role collection"
            role-template-references:
              - "$XSAPPNAME.Manager"
          - name: "Admin (ai-helpdesk-support-portal ${org}-${space})"
            description: "Admin role collection"
            role-template-references:
              - "$XSAPPNAME.Admin"

  - name: ai-helpdesk-support-portal-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
      service-name: ai-helpdesk-support-portal-db